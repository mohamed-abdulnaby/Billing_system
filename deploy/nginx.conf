# FMRZ Billing System - Nginx Production Configuration Template

server {
    listen 80;
    server_name your-domain.com; # Replace with your domain or IP

    # --- Performance: Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # --- Static Asset Optimization ---
    # Serve static assets directly from the filesystem (Ultra Fast)
    location /_app/ {
        alias /path/to/your/Billing_system/src/main/webapp/_app/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /Pictures/ {
        alias /path/to/your/Billing_system/src/main/webapp/Pictures/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- Reverse Proxy to Java JAR ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        
        # Standard Headers for Tomcat RemoteIpValve
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
